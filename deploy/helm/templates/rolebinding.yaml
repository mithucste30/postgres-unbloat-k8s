{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "postgres-unbloat-k8s.fullname" . }}
  labels:
    {{- include "postgres-unbloat-k8s.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "postgres-unbloat-k8s.fullname" . }}
subjects:
- kind: ServiceAccount
  name: {{ include "postgres-unbloat-k8s.serviceAccountName" . }}
{{- end }}
