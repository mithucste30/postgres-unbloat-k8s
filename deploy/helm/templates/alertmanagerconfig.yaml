{{- if .Values.monitoring.enabled }}
{{- if .Values.monitoring.createAlertmanagerConfig }}
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: {{ include "postgres-unbloat-k8s.fullname" . }}
  namespace: {{ .Values.monitoring.namespace | default .Release.Namespace }}
  labels:
    {{- include "postgres-unbloat-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
spec:
  receivers:
    - name: {{ include "postgres-unbloat-k8s.fullname" . }}
      webhook_configs:
        - url: 'http://{{ include "postgres-unbloat-k8s.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.config.webhook.port | default 8080 }}{{ .Values.config.webhook.path | default "/webhook" }}'
          send_resolved: {{ .Values.monitoring.alertmanagerConfig.sendResolved | default true }}
          {{- with .Values.monitoring.alertmanagerConfig.httpConfig }}
          http_config: {{ toYaml . | nindent 12 }}
          {{- end }}
  route:
    receiver: {{ include "postgres-unbloat-k8s.fullname" . }}
    group_by: {{ .Values.monitoring.alertmanagerConfig.groupBy | default list "alertname" "namespace" | toJson }}
    group_wait: {{ .Values.monitoring.alertmanagerConfig.groupWait | default "10s" }}
    group_interval: {{ .Values.monitoring.alertmanagerConfig.groupInterval | default "5m" }}
    repeat_interval: {{ .Values.monitoring.alertmanagerConfig.repeatInterval | default "12h" }}
    matchers:
      {{- range .Values.monitoring.alertmanagerConfig.matchers }}
      - name: {{ .name }}
        match_type: {{ .matchType | default "=" }}
        value: {{ .value | quote }}
      {{- end }}
{{- end }}
{{- end }}
