{{- if .Values.monitoring.enabled }}
{{- if .Values.monitoring.createAlertmanagerConfig }}
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: {{ include "postgres-unbloat-k8s.fullname" . }}
  namespace: {{ .Values.monitoring.namespace | default .Release.Namespace }}
  labels:
    {{- include "postgres-unbloat-k8s.labels" . | nindent 4 }}
    app.kubernetes.io/component: monitoring
spec:
  receivers:
    - name: {{ include "postgres-unbloat-k8s.fullname" . }}
      webhookConfigs:
        - url: 'http://{{ include "postgres-unbloat-k8s.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.config.webhook.port | default 8080 }}{{ .Values.config.webhook.path | default "/webhook" }}'
          sendResolved: {{ .Values.monitoring.alertmanagerConfig.sendResolved | default true }}
          {{- with .Values.monitoring.alertmanagerConfig.httpConfig }}
          httpConfig: {{ toYaml . | nindent 12 }}
          {{- end }}
  route:
    receiver: {{ include "postgres-unbloat-k8s.fullname" . }}
    groupBy: {{ .Values.monitoring.alertmanagerConfig.groupBy | default list "alertname" "namespace" | toJson }}
    groupWait: {{ .Values.monitoring.alertmanagerConfig.groupWait | default "10s" }}
    groupInterval: {{ .Values.monitoring.alertmanagerConfig.groupInterval | default "5m" }}
    repeatInterval: {{ .Values.monitoring.alertmanagerConfig.repeatInterval | default "12h" }}
    matchers:
      {{- range .Values.monitoring.alertmanagerConfig.matchers }}
      - name: {{ .name }}
        matchType: {{ .matchType | default "=" }}
        value: {{ .value | quote }}
      {{- end }}
{{- end }}
{{- end }}
