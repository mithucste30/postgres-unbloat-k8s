replicaCount: 1

image:
  repository: ghcr.io/mithucste30/postgres-unbloat-k8s
  pullPolicy: IfNotPresent
  tag: "0.1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

config:
  mode: in-cluster
  dryRun: false  # Set to false for actual vacuum execution
  kubernetes:
    namespace: ""
    inClusterNamespace: "postgres-test"
    inCluster: true

  discovery:
    enabled: true
    namespaces:
      - "*"  # Scan all namespaces by default
    labelSelectors:
      app.kubernetes.io/name: postgresql
      app: postgresql
      app.kubernetes.io/instance: postgres
      app: postgres
      role: database
      cnpg.io/cluster: ""
      cnpg.io/instanceName: ""
      cnpg.io/podRole: instance

  webhook:
    enabled: true
    port: 8080
    path: /webhook
    secret: ""  # Set to secure webhook endpoint

  logging:
    level: info

server:
  metricsPort: 9090

monitoring:
  enabled: false  # Enable to create Prometheus Operator resources
  namespace: monitoring  # Namespace where Prometheus Operator is installed

  # PrometheusRule configuration (enables automatic alert generation)
  createPrometheusRule: true
  prometheusRule:
    interval: 30s
    rules:
      - alert: PostgreSQLTableHighBloat
        # Dead tuples > 10% and > 100 tuples
        expr: '(pg_stat_user_tables_n_dead_tup / (pg_stat_user_tables_n_live_tup + pg_stat_user_tables_n_dead_tup)) > 0.10 and pg_stat_user_tables_n_dead_tup > 100'
        for: 5m
        severity: warning
        labels:
          operator: "postgres-unbloat-k8s"
        annotations:
          summary: "High table bloat detected"
          description: "Table {{ $labels.schemaname }}.{{ $labels.relname }} in namespace {{ $labels.namespace }} has {{ $value | humanizePercentage }} dead tuples"

      - alert: PostgreSQLTableCriticalBloat
        # Dead tuples > 30% and > 500 tuples
        expr: '(pg_stat_user_tables_n_dead_tup / (pg_stat_user_tables_n_live_tup + pg_stat_user_tables_n_dead_tup)) > 0.30 and pg_stat_user_tables_n_dead_tup > 500'
        for: 2m
        severity: critical
        labels:
          operator: "postgres-unbloat-k8s"
        annotations:
          summary: "Critical table bloat detected"
          description: "Table {{ $labels.schemaname }}.{{ $labels.relname }} in namespace {{ $labels.namespace }} has {{ $value | humanizePercentage }} dead tuples - requires FULL vacuum"

  # AlertmanagerConfig configuration (enables automatic webhook routing)
  createAlertmanagerConfig: false  # Disabled by default - set to true to enable automatic routing
  alertmanagerConfig:
    sendResolved: true
    groupBy:
      - alertname
      - namespace
    groupWait: 10s
    groupInterval: 5m
    repeatInterval: 12h
    matchers:
      - name: alertname
        matchType: =~
        value: "PostgreSQL.*Bloat"
    # Optional: HTTP client config for TLS/auth
    # httpConfig:
    #   bearerTokenSecret:
    #     name: webhook-secret
    #     key: token

rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "secrets", "configmaps", "services", "namespaces"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["batch"]
      resources: ["jobs"]
      verbs: ["get", "list", "watch", "create", "delete"]
