replicaCount: 1

image:
  repository: ghcr.io/mithucste30/postgres-unbloat-k8s
  pullPolicy: IfNotPresent
  tag: "0.1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

config:
  mode: in-cluster
  dryRun: false  # Set to false for actual vacuum execution
  kubernetes:
    namespace: ""
    inClusterNamespace: "postgres-test"
    inCluster: true

  discovery:
    enabled: true
    namespaces:
      - "*"  # Scan all namespaces by default
    labelSelectors:
      app.kubernetes.io/name: postgresql
      app: postgresql
      app.kubernetes.io/instance: postgres
      app: postgres
      role: database
      cnpg.io/cluster: ""
      cnpg.io/instanceName: ""
      cnpg.io/podRole: instance

  webhook:
    enabled: true
    port: 8080
    path: /webhook
    secret: ""  # Set to secure webhook endpoint

  logging:
    level: info

server:
  metricsPort: 9090

rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "secrets", "configmaps", "services", "namespaces"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["batch"]
      resources: ["jobs"]
      verbs: ["get", "list", "watch", "create", "delete"]
