replicaCount: 1

image:
  repository: ghcr.io/mithucste30/postgres-unbloat-k8s
  pullPolicy: IfNotPresent
  # tag is automatically set from Chart.appVersion (e.g., "0.6.0" -> image tag "v0.6.0")
  # Override only if needed: tag: "custom-tag"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true

service:
  type: ClusterIP
  port: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}

config:
  mode: in-cluster
  dryRun: false  # Set to false for actual vacuum execution
  kubernetes:
    namespace: ""
    inClusterNamespace: "postgres-test"
    inCluster: true

  discovery:
    enabled: true
    namespaces:
      - "*"  # Scan all namespaces by default
    labelSelectors:
      app.kubernetes.io/name: postgresql
      app: postgresql
      app.kubernetes.io/instance: postgres
      app: postgres
      role: database
      cnpg.io/cluster: ""
      cnpg.io/instanceName: ""
      cnpg.io/podRole: instance

  webhook:
    enabled: true
    port: 8080
    path: /webhook
    secret: ""  # Set to secure webhook endpoint

  logging:
    level: info

server:
  metricsPort: 9090

monitoring:
  enabled: false  # Enable to create Prometheus Operator resources
  namespace: monitoring  # Namespace where Prometheus Operator is installed

  # PrometheusRule configuration (enables automatic alert generation)
  createPrometheusRule: true
  prometheusRule:
    interval: 30s
    rules:
      # High Bloat: Table has >10% bloat and >10000 dead tuples
      - alert: PostgreSQLTableHighBloat
        expr: '(pg_stat_user_tables_n_dead_tup / (pg_stat_user_tables_n_live_tup + pg_stat_user_tables_n_dead_tup)) > 0.10 and pg_stat_user_tables_n_dead_tup > 10000'
        for: 5m
        severity: warning
        labels:
          operator: "postgres-unbloat-k8s"
          alert_type: "bloat"
        annotations:
          summary: "PostgreSQL table {{ $labels.relname }} has high bloat"
          description: "Table {{ $labels.schemaname }}.{{ $labels.relname }} has {{ $value | humanizePercentage }} dead tuples. Database: {{ $labels.namespace }}"

      # Critical Bloat: Table has >30% bloat
      - alert: PostgreSQLTableCriticalBloat
        expr: '(pg_stat_user_tables_n_dead_tup / (pg_stat_user_tables_n_live_tup + pg_stat_user_tables_n_dead_tup)) > 0.30'
        for: 5m
        severity: critical
        labels:
          operator: "postgres-unbloat-k8s"
          alert_type: "bloat"
        annotations:
          summary: "PostgreSQL table {{ $labels.relname }} has CRITICAL bloat"
          description: "Table {{ $labels.schemaname }}.{{ $labels.relname }} has {{ $value | humanizePercentage }} dead tuples (CRITICAL). Database: {{ $labels.namespace }}. Action: Consider manual VACUUM immediately."

      # Not Vacuumed: Table hasn't been vacuumed in 24 hours
      - alert: PostgreSQLTableNotVacuumed
        expr: '(time() - pg_stat_user_tables_last_autovacuum) > 86400 and pg_stat_user_tables_n_dead_tup > 1000'
        for: 10m
        severity: warning
        labels:
          operator: "postgres-unbloat-k8s"
          alert_type: "vacuum"
        annotations:
          summary: "PostgreSQL table {{ $labels.relname }} hasn't been vacuumed recently"
          description: "Table {{ $labels.schemaname }}.{{ $labels.relname }} hasn't been autovacuumed in over 24 hours. Database: {{ $labels.namespace }}"

      # Large Table Bloat: Large table (>100MB) has >20% bloat
      - alert: PostgreSQLLargeTableBloat
        expr: '(pg_stat_user_tables_n_dead_tup / (pg_stat_user_tables_n_live_tup + pg_stat_user_tables_n_dead_tup)) > 0.20 and pg_total_relation_size(schemaname||"."||relname) > 100000000'
        for: 10m
        severity: critical
        labels:
          operator: "postgres-unbloat-k8s"
          alert_type: "bloat"
        annotations:
          summary: "Large PostgreSQL table {{ $labels.relname }} has significant bloat"
          description: "Large table {{ $labels.schemaname }}.{{ $labels.relname }} has {{ $value | humanizePercentage }} bloat. This impacts performance significantly. Action: Schedule maintenance window for VACUUM FULL."

      # Never Vacuumed: Table has never been autovacuumed and has dead tuples
      - alert: PostgreSQLTableNeverVacuumed
        expr: 'pg_stat_user_tables_last_autovacuum == 0 and pg_stat_user_tables_n_dead_tup > 500'
        for: 1h
        severity: info
        labels:
          operator: "postgres-unbloat-k8s"
          alert_type: "vacuum"
        annotations:
          summary: "PostgreSQL table {{ $labels.relname }} has never been autovacuumed"
          description: "Table {{ $labels.schemaname }}.{{ $labels.relname }} has never been autovacuumed. Dead tuples: {{ $labels.n_dead_tup }}. Database: {{ $labels.namespace }}"

  # AlertmanagerConfig configuration (enables automatic webhook routing)
  createAlertmanagerConfig: false  # Disabled by default - set to true to enable automatic routing
  alertmanagerConfig:
    sendResolved: true
    groupBy:
      - alertname
      - namespace
    groupWait: 10s
    groupInterval: 5m
    repeatInterval: 12h
    # Match ALL postgres-unbloat-k8s alerts
    matchers:
      - name: operator
        matchType: =
        value: "postgres-unbloat-k8s"
    # Optional: HTTP client config for TLS/auth
    # httpConfig:
    #   bearerTokenSecret:
    #     name: webhook-secret
    #     key: token

rbac:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "secrets", "configmaps", "services", "namespaces"]
      verbs: ["get", "list", "watch"]
    - apiGroups: ["batch"]
      resources: ["jobs"]
      verbs: ["get", "list", "watch", "create", "delete"]
